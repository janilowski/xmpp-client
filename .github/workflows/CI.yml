name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests and static checks
        run: |
          bun run test:unit
          bun run lint
          bun run typecheck

      - name: Build and check bundle size
        run: |
          bun run build
          bun run bundlesize

      - name: Install Prosody
        run: |
          sudo wget "https://prosody.im/downloads/repos/$(lsb_release -sc)/prosody.sources" -O /etc/apt/sources.list.d/prosody.sources
          sudo apt-get update
          sudo apt-get install --yes prosody lua-bitop lua-sec luarocks
          sudo systemctl stop prosody

      - name: Install Prosody test modules and start server
        run: |
          bun run prosody:setup
          bun run server:start

      - name: Integration tests
        run: |
          bun run test:e2e
          bun run test:browser

      - name: Show Prosody errors
        if: failure()
        run: test ! -f server/prosody.err || cat server/prosody.err

      - name: Stop test server
        if: always()
        run: bun run server:stop
